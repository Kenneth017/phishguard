<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhishGuard Console</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    a { color: #38bdf8; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .navbar {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .navbar .brand { font-size: 18px; font-weight: 700; color: #38bdf8; }
    .navbar .brand span { color: #64748b; font-weight: 400; font-size: 13px; margin-left: 8px; }
    .navbar .nav-links { display: flex; gap: 16px; font-size: 14px; }

    .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .badge-low      { background: #14532d; color: #4ade80; }
    .badge-medium   { background: #78350f; color: #fbbf24; }
    .badge-high     { background: #7f1d1d; color: #f87171; }
    .badge-critical { background: #450a0a; color: #fca5a5; }
    .badge-pending  { background: #1e3a5f; color: #7dd3fc; }
    .badge-reviewed { background: #3b2f00; color: #fde68a; }
    .badge-resolved { background: #14532d; color: #4ade80; }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card h2 { font-size: 16px; margin-bottom: 12px; color: #f1f5f9; }

    .btn {
      display: inline-block; padding: 8px 16px; border-radius: 6px;
      font-size: 13px; font-weight: 600; cursor: pointer; border: none;
    }
    .btn-primary { background: #0284c7; color: #fff; }
    .btn-primary:hover { background: #0369a1; }
    .btn-danger  { background: #b91c1c; color: #fff; }
    .btn-danger:hover  { background: #991b1b; }
    .btn-ghost  { background: #334155; color: #e2e8f0; }
    .btn-ghost:hover  { background: #475569; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 10px 12px; color: #94a3b8; border-bottom: 1px solid #334155; }
    td { padding: 10px 12px; border-bottom: 1px solid #1e293b; vertical-align: top; }
    tr:hover td { background: #1e293b; }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 8px 12px; background: #0f172a;
      border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: 14px;
    }
    .form-group textarea { resize: vertical; min-height: 100px; }

    .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
    .alert-error { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }
  </style>
</head>
<body>
  {% block navbar %}
  <nav class="navbar">
    <div>
      <span class="brand">PhishGuard <span>Admin Console</span></span>
    </div>
    <div class="nav-links">
      <a href="/console">Dashboard</a>
      <a href="/console/logout">Logout</a>
    </div>
  </nav>
  {% endblock %}

  {% block content %}{% endblock %}
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PhishGuard Console — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0;
           display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .box { background: #1e293b; border: 1px solid #334155; border-radius: 12px;
           padding: 40px; width: 360px; }
    h1 { font-size: 22px; color: #38bdf8; margin-bottom: 6px; }
    p  { font-size: 13px; color: #64748b; margin-bottom: 24px; }
    label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
    input[type=password] {
      width: 100%; padding: 10px 12px; background: #0f172a;
      border: 1px solid #334155; border-radius: 6px; color: #e2e8f0;
      font-size: 14px; margin-bottom: 16px;
    }
    button { width: 100%; padding: 10px; background: #0284c7; color: #fff;
             border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
    button:hover { background: #0369a1; }
    .error { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d;
             padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>PhishGuard</h1>
    <p>Admin Console — sign in to continue</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/console/login">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter admin password" autofocus />
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
    body { width: 360px; background: #0f172a; color: #f1f5f9; font-size: 13px; }

    /* Header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; border-bottom: 1px solid #1e293b;
    }
    .header h1 { font-size: 16px; font-weight: 700; color: #38bdf8; }
    .header span { font-size: 11px; color: #475569; }

    /* Risk row */
    .risk-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; border-bottom: 1px solid #1e293b;
    }
    .risk-badge {
      padding: 4px 14px; border-radius: 999px;
      font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    }
    .risk-low      { background: #14532d; color: #4ade80; }
    .risk-medium   { background: #78350f; color: #fbbf24; }
    .risk-high     { background: #7f1d1d; color: #f87171; }
    .risk-critical { background: #450a0a; color: #fca5a5; }
    .confidence    { font-size: 12px; color: #64748b; }
    .model-tag     { font-size: 10px; color: #334155; margin-top: 2px; text-align: right; }

    /* Sections */
    .section { padding: 10px 14px; border-bottom: 1px solid #1e293b; }
    .section-title { font-size: 10px; font-weight: 700; text-transform: uppercase;
                     letter-spacing: 0.08em; color: #475569; margin-bottom: 8px; }

    /* Email info */
    .info-row { display: flex; gap: 8px; padding: 3px 0; }
    .info-label { color: #475569; min-width: 52px; flex-shrink: 0; }
    .info-value { color: #cbd5e1; word-break: break-all; }

    /* Checks */
    .check { display: flex; align-items: flex-start; gap: 7px; padding: 4px 0; }
    .check-icon { font-size: 12px; flex-shrink: 0; margin-top: 1px; }
    .check-pass .check-icon { color: #4ade80; }
    .check-fail .check-icon { color: #f87171; }
    .check-warn .check-icon { color: #fbbf24; }
    .check-text { color: #cbd5e1; line-height: 1.4; }

    /* AI reasons */
    .reason { padding: 4px 0; color: #cbd5e1; line-height: 1.4; }
    .reason::before { content: "• "; color: #38bdf8; }

    .recommendation { color: #e2e8f0; line-height: 1.5; font-size: 12px; margin-top: 6px; }

    /* Links */
    details { padding: 10px 14px; border-bottom: 1px solid #1e293b; }
    summary {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: #475569; cursor: pointer; list-style: none;
      display: flex; align-items: center; justify-content: space-between;
    }
    summary::-webkit-details-marker { display: none; }
    summary::after { content: "▸"; font-size: 10px; color: #475569; }
    details[open] summary::after { content: "▾"; }
    .link-item {
      margin-top: 6px; padding: 5px 8px; background: #1e293b;
      border-radius: 5px; font-size: 11px; word-break: break-all; line-height: 1.5;
    }
    .link-display { color: #94a3b8; }
    .link-href    { color: #38bdf8; }
    .link-flags   { color: #fbbf24; font-size: 10px; margin-top: 2px; }
    .link-count   { background:#334155; color:#94a3b8; padding:1px 6px;
                    border-radius:999px; font-size:10px; font-weight:700; margin-left:6px; }
    .link-more    { color:#475569; font-size:11px; margin-top:6px; }

    /* Report */
    .report-section { padding: 10px 14px; }
    .report-hint { color: #475569; font-size: 11px; margin-bottom: 8px; }
    .report-section input {
      width: 100%; padding: 7px 10px; background: #1e293b;
      border: 1px solid #334155; border-radius: 6px;
      color: #e2e8f0; font-size: 12px; margin-bottom: 7px;
    }
    .report-btn {
      width: 100%; padding: 8px; border: none; border-radius: 6px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      background: #7f1d1d; color: #fca5a5;
    }
    .report-btn:hover { background: #991b1b; }
    .report-btn:disabled { opacity: 0.5; cursor: default; }
    .report-success { font-size: 12px; color: #4ade80; text-align: center; padding: 6px 0; }

    /* States */
    .status-msg { padding: 32px 14px; text-align: center; color: #475569; }
    .refining    { font-size: 11px; color: #f59e0b; padding: 6px 14px;
                   border-bottom: 1px solid #1e293b; }
  </style>
</head>
<body>
  <div class="header">
    <h1>PhishGuard</h1>
    <span>Email Phishing Detector</span>
  </div>
  <div id="main"><div class="status-msg">Open an email to analyze it.</div></div>
  <script src="popup.js"></script>
</body>
</html>
